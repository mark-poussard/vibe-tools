<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Game: The Final Stand</title>
    <style>
        :root {
            --mtg: #d32f2f;
            --mag: #1976d2;
            --cel: #388e3c;
            --lck: #fbc02d;
            --bg: #1e1e24;
            --panel: #2b2b36;
            --text: #ffffff;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* Mobile-First Base Styles */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            overflow: hidden; 
            height: 100dvh; /* Uses dynamic viewport height for mobile browsers */
        }
        
        #game-container { 
            display: flex; 
            flex-direction: column; 
            height: 100%; 
            justify-content: space-between; 
        }
        
        .player-area { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            padding: 5px; 
            border-bottom: 2px solid #000; 
            position: relative; 
            min-height: 0; /* Prevents overflow pushing */
            justify-content: space-evenly;
        }
        #player-0-area { border-top: 2px solid #000; border-bottom: none; background-color: #23232c; }
        
        .info-bar { 
            display: flex; 
            flex-wrap: wrap;
            justify-content: space-between; 
            align-items: center; 
            background: rgba(0,0,0,0.5); 
            padding: 4px 6px; 
            border-radius: 5px; 
            margin-bottom: 2px; 
            font-weight: bold; 
            font-size: 0.75em;
            gap: 5px;
        }
        .deck-info { color: #aaa; }
        .role-badge { padding: 3px 6px; border-radius: 4px; font-size: 0.85em; text-transform: uppercase; background: #555; }
        .role-attacker { background: #d32f2f; }
        .role-defender { background: #1976d2; }
        
        /* Dynamic fluid sizing for hands/fields to always fit mobile width */
        .field { flex: 1; display: flex; align-items: center; justify-content: center; gap: clamp(2px, 1.5vw, 10px); min-height: clamp(80px, 24vw, 120px); background: rgba(255,255,255,0.05); border-radius: 8px; margin-bottom: 3px; }
        .hand { display: flex; justify-content: center; gap: clamp(2px, 1vw, 10px); min-height: clamp(80px, 24vw, 140px); }
        
        /* Mobile Center Board Layout (Grid) */
        #center-board { 
            flex: none; 
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-areas: 
                "controls stack"
                "log log";
            gap: 6px;
            background-color: var(--panel); 
            padding: 8px; 
            border-top: 2px solid #444; 
            border-bottom: 2px solid #444; 
            z-index: 10; 
            box-shadow: 0 0 15px rgba(0,0,0,0.5); 
        }
        
        #controls { grid-area: controls; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 5px; text-align: center; }
        #controls h3 { font-size: 1.1em; margin-bottom: 0; }
        
        #stack-container { grid-area: stack; display: flex; gap: -15px; overflow-x: auto; padding: 5px; background: #111; border-radius: 5px; border: 1px solid #444; min-height: 70px; justify-content: flex-start; align-items: center; }
        
        #log-container { grid-area: log; height: 65px; background: #111; border-radius: 5px; padding: 6px; overflow-y: auto; font-size: 0.75em; font-family: monospace; border: 1px solid #444; min-height: 0; }

        .btn { padding: 8px 14px; font-size: 0.85em; font-weight: bold; color: white; background: #1976d2; border: none; border-radius: 5px; cursor: pointer; transition: 0.2s; white-space: nowrap; }
        .btn:hover { background: #1565c0; }
        .btn:disabled { background: #555; cursor: not-allowed; }
        .btn-action { background: #d32f2f; }
        .btn-action:hover { background: #b71c1c; }
        
        /* Fluid Cards (Scales based on viewport width) */
        .card { 
            width: clamp(55px, 16vw, 90px); 
            height: clamp(77px, 22.4vw, 130px); 
            border-radius: 6px; 
            background: #333; 
            display: flex; 
            flex-direction: column; 
            cursor: pointer; 
            user-select: none; 
            transition: transform 0.1s, border 0.1s; 
            border: 1px solid #555; 
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5); 
            overflow: hidden; 
            position: relative; 
        }
        .card:hover { transform: translateY(-3px); border-color: #888; }
        .card.selected { border-color: #fbc02d; box-shadow: 0 0 8px #fbc02d; transform: translateY(-8px); }
        .card.Monster { background: linear-gradient(135deg, #3a3a40, #222); }
        .card.Support { background: linear-gradient(135deg, #2a1a4a, #1a0a2a); }
        
        /* Fluid Font Sizing inside cards */
        .card-name { font-size: clamp(7px, 2.2vw, 11px); font-weight: bold; text-align: center; padding: 3px 1px; background: rgba(0,0,0,0.6); }
        .card-type { font-size: clamp(6px, 1.8vw, 9px); text-align: center; color: #bbb; padding-top: 2px; }
        .card-effect { font-size: clamp(6.5px, 2.1vw, 10px); padding: 3px; text-align: center; line-height: 1.1; margin: auto 0; }
        .card-stats { display: flex; flex-wrap: wrap; margin-top: auto; border-top: 1px solid #000; }
        .stat { width: 50%; text-align: center; font-size: clamp(7.5px, 2.4vw, 11px); padding: 2px 0; font-weight: bold; color: white; }
        
        .stat-mtg { background: var(--mtg); }
        .stat-mag { background: var(--mag); }
        .stat-cel { background: var(--cel); }
        .stat-lck { background: var(--lck); }
        .sigil-mark { position: absolute; top: 1px; left: 2px; font-size: clamp(8px, 2.5vw, 12px); }

        /* Modal Layout */
        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center; }
        .modal { background: var(--panel); padding: 15px; border-radius: 10px; text-align: center; border: 2px solid #555; width: 92vw; max-width: 400px; }
        .modal h2 { margin-bottom: 10px; font-size: 1.2em; }
        .stat-picker { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 10px; }
        .stat-picker .btn { flex: 1 1 40%; padding: 12px 10px; } /* Big touch targets for mobile */
        
        .active-turn { box-shadow: inset 0 0 25px rgba(255, 255, 255, 0.1); }
        
        /* Stack visual sizing */
        #stack-container .card { 
            width: clamp(45px, 13vw, 70px); 
            height: clamp(63px, 18.2vw, 100px); 
            margin-right: -15px; 
        }

        /* ================= Desktop Sizing (Scales Up) ================= */
        @media (min-width: 768px) {
            .player-area { padding: 10px; }
            .info-bar { font-size: 0.9em; padding: 5px 10px; }
            .btn { padding: 10px 20px; font-size: 1em; }
            .card { border: 2px solid #555; }
            .card:hover { transform: translateY(-5px); }
            .card.selected { transform: translateY(-10px); box-shadow: 0 0 12px #fbc02d; }
            
            /* Change Center Board back to Flex Row on wide screens */
            #center-board { 
                flex: 0.8; 
                display: flex; 
                flex-direction: row; 
                padding: 10px 20px; 
                align-items: stretch;
            }
            #controls { flex: 1; gap: 10px; }
            #stack-container { flex: 1; min-height: 100px; gap: -20px; padding: 10px; justify-content: flex-start; }
            #log-container { flex: 1; height: auto; min-height: 100px; font-size: 0.85em; padding: 10px; margin-right: 10px; }
            
            #stack-container .card { margin-right: -25px; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <!-- Player 1 Area (Top) -->
    <div id="player-1-area" class="player-area">
        <div class="info-bar">
            <span id="p1-name">Player 2</span>
            <span id="p1-role" class="role-badge"></span>
            <span class="deck-info">Deck: <span id="p1-deck"></span> | Grave: <span id="p1-grave"></span></span>
        </div>
        <div id="p1-hand" class="hand"></div>
        <div id="p1-field" class="field"></div>
    </div>

    <!-- Center Board -->
    <div id="center-board">
        <div id="log-container"></div>
        
        <div id="controls">
            <h3 id="phase-title">Setup</h3>
            <div style="font-size: 0.85em; margin-bottom: 5px;">Battle Stat: <strong id="battle-stat-display">None</strong></div>
            <button id="main-btn" class="btn">Start Game</button>
            <button id="draw-btn" class="btn" style="display: none; margin-top: 5px; background: #388e3c;">Draw to 5</button>
            <button id="pass-btn" class="btn btn-action" style="display: none;">Pass</button>
        </div>

        <div id="stack-container"></div>
    </div>

    <!-- Player 0 Area (Bottom) -->
    <div id="player-0-area" class="player-area">
        <div id="p0-field" class="field"></div>
        <div id="p0-hand" class="hand"></div>
        <div class="info-bar">
            <span id="p0-name">Player 1</span>
            <span id="p0-role" class="role-badge"></span>
            <span class="deck-info">Deck: <span id="p0-deck"></span> | Grave: <span id="p0-grave"></span></span>
        </div>
    </div>
</div>

<!-- Modal for Stat Picking -->
<div id="modal-overlay">
    <div class="modal">
        <h2 id="modal-title">Choose Battle Stat</h2>
        <div class="stat-picker">
            <button class="btn stat-mtg" onclick="selectStat('Mtg')">⚔️ Might</button>
            <button class="btn stat-mag" onclick="selectStat('Mag')">🔮 Magic</button>
            <button class="btn stat-cel" onclick="selectStat('Cel')">⚡ Celerity</button>
            <button class="btn stat-lck" onclick="selectStat('Lck')">🍀 Luck</button>
        </div>
    </div>
</div>

<script>
/* ===================== GAME DATA ===================== */
const MONSTER_DB = [
    { name: 'Ironclad Grunt', Mtg: 3, Mag: 0, Cel: 1, Lck: 0 },
    { name: 'Novice Acolyte', Mtg: 0, Mag: 3, Cel: 1, Lck: 0 },
    { name: 'Fleet Runner', Mtg: 1, Mag: 0, Cel: 3, Lck: 0 },
    { name: 'Tavern Gambler', Mtg: 0, Mag: 1, Cel: 0, Lck: 3 },
    { name: 'Spellblade', Mtg: 3, Mag: 3, Cel: 1, Lck: 0 },
    { name: 'Wind-Walker', Mtg: 1, Mag: 0, Cel: 3, Lck: 3 },
    { name: 'Savage Hunter', Mtg: 3, Mag: 0, Cel: 3, Lck: 1 },
    { name: 'Cursed Idol', Mtg: 0, Mag: 3, Cel: 1, Lck: 3 },
    { name: 'Dwarven Sapper', Mtg: 3, Mag: 0, Cel: 1, Lck: 3 },
    { name: 'Lightning Disciple', Mtg: 1, Mag: 3, Cel: 3, Lck: 0 },
    { name: 'Ronin of the Waste', Mtg: 3, Mag: 1, Cel: 3, Lck: 0 },
    { name: 'Mist-Walker Star-Gazer', Mtg: 0, Mag: 3, Cel: 1, Lck: 3 },
    { name: 'Ancestral Protector', Mtg: 3, Mag: 3, Cel: 0, Lck: 1 },
    { name: 'Venom-Edge Roof-Runner', Mtg: 1, Mag: 0, Cel: 3, Lck: 3 },
    { name: 'Brass Sentinel', Mtg: 3, Mag: 0, Cel: 3, Lck: 1 },
    { name: 'Blink-Wraith', Mtg: 0, Mag: 3, Cel: 3, Lck: 1 },
    { name: 'War Behemoth', Mtg: 5, Mag: 1, Cel: 3, Lck: 1 },
    { name: 'Archmage Eternal', Mtg: 2, Mag: 5, Cel: 1, Lck: 3 },
    { name: 'Storm Griffin', Mtg: 3, Mag: 1, Cel: 5, Lck: 2 },
    { name: 'Fortune Dragon', Mtg: 2, Mag: 3, Cel: 1, Lck: 5 }
];

const SUPPORT_DB = [
    { name: 'Minor Surge', type: 'Incant', text: '+2 to your Stat', effect: (s, owner) => s[owner] += 2 },
    { name: 'Major Surge', type: 'Incant', text: '+4 to your Stat', effect: (s, owner) => s[owner] += 4 },
    { name: 'Weaken', type: 'Incant', text: '-2 to Opponent Stat', effect: (s, owner, opp) => s[opp] = Math.max(0, s[opp] - 2) },
    { name: 'Nullify', type: 'Incant', text: 'Opponent Stat = 0', effect: (s, owner, opp) => s[opp] = 0 },
    { name: 'Heroic Anthem', type: 'Incant', text: 'Double your Stat', effect: (s, owner) => s[owner] *= 2 },
    { name: 'Lucky Coin', type: 'Sigil', text: '+1 to your Stat. Returns to hand.', effect: (s, owner) => s[owner] += 1 },
    { name: 'Cursed Ring', type: 'Sigil', text: '-1 to Opponent Stat. Returns.', effect: (s, owner, opp) => s[opp] = Math.max(0, s[opp] - 1) }
];

/* ===================== GAME STATE ===================== */
let state = {
    phase: 'INIT', // INIT, SETUP_DEFENDER, MAINT_DEFENDER, MAINT_ATTACKER, ATTACK, CLASH, CHOOSE_NEW_DEFENDER, TIE_REPLACE_DEFENDER, GAME_OVER
    activePlayer: 0,
    defenderIndex: 0,
    attackerIndex: 1,
    battleStat: null,
    players: [ { deck: [], hand: [], field: [], grave: [] }, { deck: [], hand: [], field: [], grave: [] } ],
    stack: [],
    passedClash: 0,
    selectedCards: [] // Array of unique card IDs selected in hand/field
};

let cardIdCounter = 0;

function createCard(data, type) {
    let card = { id: 'c_' + cardIdCounter++, name: data.name, type: type };
    if (type === 'Monster') {
        card.stats = { Mtg: data.Mtg, Mag: data.Mag, Cel: data.Cel, Lck: data.Lck };
    } else {
        card.subType = data.type; // Incant or Sigil
        card.text = data.text;
        card.effect = data.effect;
    }
    return card;
}

function generateDeck() {
    let deck = [];
    // 25 Monsters (randomized from DB)
    for(let i=0; i<25; i++) {
        deck.push(createCard(MONSTER_DB[Math.floor(Math.random() * MONSTER_DB.length)], 'Monster'));
    }
    // 15 Supports
    for(let i=0; i<15; i++) {
        deck.push(createCard(SUPPORT_DB[Math.floor(Math.random() * SUPPORT_DB.length)], 'Support'));
    }
    return deck.sort(() => Math.random() - 0.5);
}

function log(msg) {
    const lg = document.getElementById('log-container');
    lg.innerHTML += `<div>> ${msg}</div>`;
    lg.scrollTop = lg.scrollHeight;
}

/* ===================== CORE MECHANICS ===================== */

function initGame() {
    state.players[0].deck = generateDeck();
    state.players[1].deck = generateDeck();
    log("Decks generated and shuffled.");
    
    // Coin Toss
    state.defenderIndex = Math.random() < 0.5 ? 0 : 1;
    state.attackerIndex = 1 - state.defenderIndex;
    state.activePlayer = state.defenderIndex;
    
    log(`Coin toss! Player ${state.defenderIndex + 1} is the Opener (Defender).`);
    
    drawUpTo(0, 5);
    drawUpTo(1, 5);
    
    autoCycleUntilMonster(state.defenderIndex);
    
    state.phase = 'SETUP_DEFENDER';
    updateUI();
}

function drawUpTo(pIndex, amount) {
    let p = state.players[pIndex];
    while(p.hand.length < amount) {
        if(p.deck.length === 0) {
            gameOver(1 - pIndex, `Player ${pIndex + 1} tried to draw from an empty deck!`);
            return;
        }
        p.hand.push(p.deck.pop());
    }
}

function autoCycleUntilMonster(pIndex) {
    let p = state.players[pIndex];
    while (!p.hand.some(c => c.type === 'Monster')) {
        log(`Player ${pIndex + 1} has no monsters! Discarding hand and drawing 5 (The Cycle).`);
        while(p.hand.length > 0) p.grave.push(p.hand.pop());
        drawUpTo(pIndex, 5);
        if(state.phase === 'GAME_OVER') return;
    }
}

function discardSelected() {
    let p = state.players[state.activePlayer];
    let toDiscard = p.hand.filter(c => state.selectedCards.includes(c.id));
    p.hand = p.hand.filter(c => !state.selectedCards.includes(c.id));
    p.grave.push(...toDiscard);
    log(`Player ${state.activePlayer + 1} discarded ${toDiscard.length} cards.`);
    state.selectedCards = [];
    drawUpTo(state.activePlayer, 5);
    updateUI();
}

function gameOver(winnerIndex, reason) {
    state.phase = 'GAME_OVER';
    log(`*** GAME OVER ***`);
    log(reason);
    log(`Player ${winnerIndex + 1} Wins!`);
    updateUI();
}

function handleDrawAction() {
    let p = state.players[state.activePlayer];
    if ((state.phase === 'MAINT_DEFENDER' || state.phase === 'MAINT_ATTACKER') && p.hand.length < 5) {
        drawUpTo(state.activePlayer, 5);
        log(`Player ${state.activePlayer + 1} drew back up to 5 cards.`);
        updateUI();
    }
}

/* ===================== PHASE TRANSITIONS & LOGIC ===================== */

function handleMainAction() {
    const p = state.players[state.activePlayer];
    
    if (state.phase === 'INIT') {
        initGame();
    }
    else if (state.phase === 'MAINT_DEFENDER') {
        // Discard selected
        if (state.selectedCards.length > 0) {
            discardSelected();
        } else {
            // End Maintenance
            log(`Player ${state.activePlayer + 1} ends Maintenance.`);
            state.phase = 'MAINT_ATTACKER';
            state.activePlayer = state.attackerIndex;
        }
    }
    else if (state.phase === 'MAINT_ATTACKER') {
        if (state.selectedCards.length > 0) {
            discardSelected();
        } else {
            // Check Constraint: Must have monster
            if (!p.hand.some(c => c.type === 'Monster')) {
                alert("Attacker must have at least 1 Monster in hand to end Maintenance!");
                return;
            }
            log(`Player ${state.activePlayer + 1} ends Maintenance.`);
            state.phase = 'ATTACK';
        }
    }
    else if (state.phase === 'ATTACK') {
        if (state.selectedCards.length === 0) return;
        let attackingMonsters = p.hand.filter(c => state.selectedCards.includes(c.id) && c.type === 'Monster');
        if (attackingMonsters.length !== state.selectedCards.length) {
            alert("Only select Monsters to attack with!"); return;
        }
        p.hand = p.hand.filter(c => !state.selectedCards.includes(c.id));
        p.field.push(...attackingMonsters);
        state.selectedCards = [];
        
        let sum = attackingMonsters.reduce((acc, m) => acc + m.stats[state.battleStat], 0);
        log(`Player ${state.activePlayer + 1} attacks with ${attackingMonsters.length} monster(s). Base ${state.battleStat}: ${sum}`);
        
        state.phase = 'CLASH';
        state.activePlayer = state.attackerIndex; // Attacker has first chance to play support
        state.passedClash = 0;
    }
    
    updateUI();
}

function handlePassAction() {
    if (state.phase === 'CLASH') {
        log(`Player ${state.activePlayer + 1} passes.`);
        state.passedClash++;
        if (state.passedClash >= 2) {
            resolveCombat();
        } else {
            state.activePlayer = 1 - state.activePlayer;
        }
        updateUI();
    }
}

function handleCardClick(cardId, zone, ownerIndex) {
    if (state.phase === 'GAME_OVER') return;

    // FIX: Retrieve the actual card object by ID to preserve its methods
    let card;
    if (zone === 'hand') card = state.players[ownerIndex].hand.find(c => c.id === cardId);
    else if (zone === 'field') card = state.players[ownerIndex].field.find(c => c.id === cardId);
    if (!card) return;

    const isOwnerActive = (ownerIndex === state.activePlayer);
    
    if (state.phase === 'SETUP_DEFENDER' || state.phase === 'TIE_REPLACE_DEFENDER') {
        if (isOwnerActive && zone === 'hand' && card.type === 'Monster') {
            state.selectedCards = [card.id]; // Temp hold
            document.getElementById('modal-overlay').style.display = 'flex';
        }
    }
    else if (state.phase === 'MAINT_DEFENDER' || state.phase === 'MAINT_ATTACKER') {
        if (isOwnerActive && zone === 'hand') {
            toggleSelect(card.id);
        }
    }
    else if (state.phase === 'ATTACK') {
        if (isOwnerActive && zone === 'hand' && card.type === 'Monster') {
            toggleSelect(card.id);
        }
    }
    else if (state.phase === 'CLASH') {
        if (isOwnerActive && zone === 'hand' && card.type === 'Support') {
            // Play support to stack
            let p = state.players[ownerIndex];
            p.hand = p.hand.filter(c => c.id !== card.id);
            state.stack.push({ card: card, owner: ownerIndex });
            log(`Player ${ownerIndex + 1} plays ${card.name}!`);
            state.passedClash = 0;
            state.activePlayer = 1 - state.activePlayer; // Alternating
            updateUI();
        }
    }
    else if (state.phase === 'CHOOSE_NEW_DEFENDER') {
        if (isOwnerActive && zone === 'field' && card.type === 'Monster') {
            // Picked one of the surviving attackers
            state.selectedCards = [card.id];
            document.getElementById('modal-overlay').style.display = 'flex';
        }
    }
    
    updateUI();
}

function toggleSelect(id) {
    if (state.selectedCards.includes(id)) {
        state.selectedCards = state.selectedCards.filter(x => x !== id);
    } else {
        state.selectedCards.push(id);
    }
}

// Called by Modal
function selectStat(stat) {
    document.getElementById('modal-overlay').style.display = 'none';
    state.battleStat = stat;
    let cardId = state.selectedCards[0];
    state.selectedCards = [];
    let p = state.players[state.activePlayer];
    
    if (state.phase === 'SETUP_DEFENDER' || state.phase === 'TIE_REPLACE_DEFENDER') {
        let card = p.hand.find(c => c.id === cardId);
        p.hand = p.hand.filter(c => c.id !== cardId);
        p.field = [card];
        log(`Player ${state.activePlayer + 1} set ${card.name} as Defender. Battle Stat is ${stat}.`);
        
        state.phase = 'MAINT_DEFENDER';
        state.activePlayer = state.defenderIndex;
    }
    else if (state.phase === 'CHOOSE_NEW_DEFENDER') {
        // Keep selected on field, others to grave
        let chosen = p.field.find(c => c.id === cardId);
        let others = p.field.filter(c => c.id !== cardId);
        p.grave.push(...others);
        p.field = [chosen];
        
        log(`Player ${state.activePlayer + 1} sets ${chosen.name} as the new Defender. New Battle Stat: ${stat}.`);
        
        // Roles Swap
        let temp = state.defenderIndex;
        state.defenderIndex = state.attackerIndex;
        state.attackerIndex = temp;
        
        state.phase = 'MAINT_DEFENDER';
        state.activePlayer = state.defenderIndex;
    }
    updateUI();
}

function resolveCombat() {
    log("--- RESOLVING CLASH ---");
    let defTotal = state.players[state.defenderIndex].field[0].stats[state.battleStat];
    let attTotal = state.players[state.attackerIndex].field.reduce((acc, m) => acc + m.stats[state.battleStat], 0);
    
    let currentStats = {
        [state.defenderIndex]: defTotal,
        [state.attackerIndex]: attTotal
    };
    
    // Resolve Stack LIFO
    for (let i = state.stack.length - 1; i >= 0; i--) {
        let item = state.stack[i];
        let opp = 1 - item.owner;
        item.card.effect(currentStats, item.owner, opp);
        log(`Resolved ${item.card.name}. Stats -> P1: ${currentStats[0]}, P2: ${currentStats[1]}`);
        
        // Cleanup support card
        if (item.card.subType === 'Sigil') {
            state.players[item.owner].hand.push(item.card);
            log(`${item.card.name} returns to hand.`);
        } else {
            state.players[item.owner].grave.push(item.card);
        }
    }
    state.stack = [];
    
    let finalAtt = currentStats[state.attackerIndex];
    let finalDef = currentStats[state.defenderIndex];
    
    log(`Final Result: Attacker (${finalAtt}) vs Defender (${finalDef})`);
    
    if (finalAtt > finalDef) {
        // Attacker Wins
        log(`Defender is defeated!`);
        let deadDef = state.players[state.defenderIndex].field.pop();
        state.players[state.defenderIndex].grave.push(deadDef);
        
        // Need to choose new defender from attackers
        state.phase = 'CHOOSE_NEW_DEFENDER';
        state.activePlayer = state.attackerIndex;
        log(`Attacker must now choose ONE surviving monster to become the new Defender.`);
    } 
    else if (finalAtt === finalDef) {
        // Tie
        log(`It's a Tie! All monsters are defeated.`);
        state.players[state.attackerIndex].grave.push(...state.players[state.attackerIndex].field);
        state.players[state.attackerIndex].field = [];
        
        let deadDef = state.players[state.defenderIndex].field.pop();
        if(deadDef) state.players[state.defenderIndex].grave.push(deadDef);
        
        // Roles Swap
        let temp = state.defenderIndex;
        state.defenderIndex = state.attackerIndex;
        state.attackerIndex = temp;
        
        log(`Roles reversed! Player ${state.defenderIndex + 1} is now the Defender.`);
        
        // New Defender must put down a new monster from hand
        state.phase = 'TIE_REPLACE_DEFENDER';
        state.activePlayer = state.defenderIndex;
        autoCycleUntilMonster(state.defenderIndex);
    }
    else {
        // Defender Survives
        log(`Attacker fails to break through! Attacking monsters destroyed.`);
        state.players[state.attackerIndex].grave.push(...state.players[state.attackerIndex].field);
        state.players[state.attackerIndex].field = [];
        
        drawUpTo(state.attackerIndex, 5);
        state.phase = 'MAINT_ATTACKER';
        state.activePlayer = state.attackerIndex;
        log(`Attacker persists! Drawn back up to 5, returning to Maintenance.`);
    }
}

/* ===================== UI RENDERING ===================== */

function renderCard(card, zone, ownerIndex) {
    if (!card) return '';
    let isSel = state.selectedCards.includes(card.id) ? 'selected' : '';
    
    // FIX: Pass card.id instead of stringified object to prevent loss of effect functions
    let html = `<div class="card ${card.type} ${isSel}" onclick="handleCardClick('${card.id}', '${zone}', ${ownerIndex})">`;
    
    if (card.type === 'Monster') {
        html += `<div class="card-name">${card.name}</div>
                 <div class="card-type">Monster</div>
                 <div class="card-stats">
                    <div class="stat stat-mtg">⚔️ ${card.stats.Mtg}</div>
                    <div class="stat stat-mag">🔮 ${card.stats.Mag}</div>
                    <div class="stat stat-cel">⚡ ${card.stats.Cel}</div>
                    <div class="stat stat-lck">🍀 ${card.stats.Lck}</div>
                 </div>`;
    } else {
        html += `<div class="card-name">${card.name}</div>
                 ${card.subType === 'Sigil' ? '<div class="sigil-mark">♾️</div>' : ''}
                 <div class="card-type">${card.subType}</div>
                 <div class="card-effect">${card.text}</div>`;
    }
    html += `</div>`;
    return html;
}

function updateUI() {
    // Player 0 (Bottom), Player 1 (Top)
    for (let i = 0; i < 2; i++) {
        document.getElementById(`p${i}-deck`).innerText = state.players[i].deck.length;
        document.getElementById(`p${i}-grave`).innerText = state.players[i].grave.length;
        
        // Render Hand (hide opponent hand if you want, but for hotseat we show all or active)
        // We will show all cards to make hotseat easier to test/play.
        let handHtml = state.players[i].hand.map(c => renderCard(c, 'hand', i)).join('');
        document.getElementById(`p${i}-hand`).innerHTML = handHtml;
        
        let fieldHtml = state.players[i].field.map(c => renderCard(c, 'field', i)).join('');
        document.getElementById(`p${i}-field`).innerHTML = fieldHtml;
        
        // Roles
        let roleSpan = document.getElementById(`p${i}-role`);
        if (state.phase !== 'INIT') {
            roleSpan.innerText = (i === state.attackerIndex) ? 'Attacker' : 'Defender';
            roleSpan.className = 'role-badge ' + ((i === state.attackerIndex) ? 'role-attacker' : 'role-defender');
        }
        
        document.getElementById(`player-${i}-area`).classList.toggle('active-turn', state.activePlayer === i && state.phase !== 'GAME_OVER');
    }

    document.getElementById('battle-stat-display').innerText = state.battleStat || 'None';
    
    // Stack
    document.getElementById('stack-container').innerHTML = state.stack.map(item => renderCard(item.card, 'stack', item.owner)).join('');

    // Central Controls
    let btn = document.getElementById('main-btn');
    let passBtn = document.getElementById('pass-btn');
    let drawBtn = document.getElementById('draw-btn');
    let title = document.getElementById('phase-title');
    
    passBtn.style.display = 'none';
    drawBtn.style.display = 'none';
    btn.style.display = 'block';
    btn.disabled = false;

    switch(state.phase) {
        case 'INIT':
            title.innerText = "Welcome";
            btn.innerText = "Start Game";
            break;
        case 'SETUP_DEFENDER':
            title.innerText = `P${state.activePlayer+1}: Play a Defender`;
            btn.style.display = 'none';
            break;
        case 'TIE_REPLACE_DEFENDER':
            title.innerText = `P${state.activePlayer+1}: Replace Defender`;
            btn.style.display = 'none';
            break;
        case 'MAINT_DEFENDER':
        case 'MAINT_ATTACKER':
            title.innerText = `P${state.activePlayer+1} Maintenance`;
            btn.innerText = state.selectedCards.length > 0 ? "Discard & Draw" : "End Maintenance";
            // Show Draw option if no cards are selected to discard AND hand is less than 5
            if (state.selectedCards.length === 0 && state.players[state.activePlayer].hand.length < 5) {
                drawBtn.style.display = 'block';
            }
            break;
        case 'ATTACK':
            title.innerText = `P${state.activePlayer+1}: Select Attackers`;
            btn.innerText = "Commit Attack";
            if (state.selectedCards.length === 0) btn.disabled = true;
            break;
        case 'CLASH':
            title.innerText = `P${state.activePlayer+1}: Play Support or Pass`;
            btn.style.display = 'none';
            passBtn.style.display = 'block';
            break;
        case 'CHOOSE_NEW_DEFENDER':
            title.innerText = `P${state.activePlayer+1}: Pick New Defender`;
            btn.style.display = 'none';
            break;
        case 'GAME_OVER':
            title.innerText = "Game Over";
            btn.style.display = 'none';
            break;
    }
}

// Attach event listeners to buttons
document.getElementById('main-btn').addEventListener('click', handleMainAction);
document.getElementById('pass-btn').addEventListener('click', handlePassAction);
document.getElementById('draw-btn').addEventListener('click', handleDrawAction);

// Init call just to set basic UI up before game starts
updateUI();
</script>
